topology_file: data/operator_topology.json
num_nodes: 21  # endpoint nodes only: 7 BS + 7 CS + 7 MECS (core/dist are routing infra)
k_shortest_paths: 3

# Traffic model
arrival_rate: 5.0
slice_duration_mean: 30
bandwidth_range: [10, 100]
price_scale: 1.0
inelastic_prob: 0.5

# Training
num_episodes: 2000
max_steps_per_episode: 500
batch_size: 64
replay_capacity: 50000
gamma: 0.95
lr: 1.0e-4
hidden_size: 256
epsilon_start: 1.0
epsilon_end: 0.05
epsilon_decay_steps: 200000  # ~400 episodes of exploration before committing
target_update_freq: 100
penalty_weight: 0.5
reward_scale: 1000.0       # divide stored rewards by this before replay buffer

# Evaluation
eval_episodes: 200
eval_interval: 100
seed: 42

# Logging
use_wandb: false
log_interval: 10
checkpoint_dir: results/checkpoints
results_dir: results
